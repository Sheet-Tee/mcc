  <meta name="apple-mobile-web-app-capable" content="yes"/>

  <link rel="manifest" href="./manifest.json"/>
  <link rel="apple-touch-icon" href="./sheetlogo.png"/>
  <title>Sheet-Tee Golf App</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a3a2a; font-family: Georgia, serif; color: #f0ead6; min-height: 100vh; }
    #root { width: 100%; min-height: 100vh; position: relative; }
    input::placeholder { color: rgba(240,234,214,0.4); }
    input { color: #f0ead6; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    .card-scene { perspective: 800px; width:100%; padding-bottom:145%; position:relative; }
    .card-inner { position:absolute; inset:0; transform-style:preserve-3d; transition:transform 0.55s cubic-bezier(.4,0,.2,1); }
    .card-inner.flipped { transform:rotateY(180deg); }
    .card-face { position:absolute; inset:0; backface-visibility:hidden; border-radius:12px; border:3px solid #fff; overflow:hidden; }
    .card-back { transform:rotateY(180deg); }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.3); border-radius: 2px; }

    /* ── Desktop scaling ── */
    @media (min-width: 900px) {
      body { font-size: 16px; }
      #root { max-width: 900px; margin: 0 auto; }
    }
    @media (min-width: 1100px) {
      body { font-size: 17px; }
      #root { max-width: 1000px; margin: 0 auto; box-shadow: 0 0 60px rgba(0,0,0,0.6); }
    }
    @media (min-width: 1400px) {
      body { font-size: 18px; }
      #root { max-width: 1100px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    // ═══════════════════════════════════════════════════════
    //  DEPLOYMENT ID — only this line changes per client
    // ═══════════════════════════════════════════════════════
    const CLUB_ID      = "demo-v2"; // ⚑ CHANGE THIS to your club slug (e.g. "arrowhead") for each new client
    const SUPABASE_URL = "https://nwizmbkurxxqcfzmrzrx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53aXptYmt1cnh4cWNmem1yenJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjA3NDEsImV4cCI6MjA4ODgzNjc0MX0.52orb0uMjVJZu4JI-5hSgYVF5bYnBniDy5rIC2j19Xo";
    // ═══════════════════════════════════════════════════════

        const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadConfig() {
      try {
        const { data } = await sb.from("store")
          .select("value")
          .eq("key", "config")
          .eq("club_id", CLUB_ID)
          .maybeSingle();
        if (data && data.value) {
          Object.assign(CONFIG, data.value);
          document.body.style.background = CONFIG.bgColor;
          const tm = document.querySelector('meta[name="theme-color"]');
          if (tm) tm.setAttribute("content", CONFIG.bgColor);
        }
      } catch(e) { console.warn("Config load failed:", e); }
    }
  </script>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // CONFIG is loaded from Supabase on mount — see loadConfig()
    // These are temporary fallbacks until config loads
    let CONFIG = {
      clubName:"Bogey Hills Country Club", tagline:"A Golf Group Unlike Any Other", bgColor:"#1a3a2a",
      bunkerName:"The Crew", bunkerTagline:"", cityLabel:"San Diego, CA", logoUrl:"https://www.sheet-tee.com/demo2.0/logo.png",
      weatherLat:32.72, weatherLon:-117.15, timezone:"America/Los_Angeles",
      adminPw:"admin", acePw:"ace", groupPw:"",
      stripeUrl:"https://sheet-tee.com",
      players:["Nack Jicklaus","Lancy Nopez","Dyson BeChambeau","Mory RcIlroy","Ron Jahm","Nelly Korda","Mideki Hatsuyama","Hen Bogan","Mollin Corikawa","Fatt Mitzpatrick","Wiger Toods","Scottie Scheffler"],
      // ── v2: courses per club. One entry = auto-select; multiple = user picks ──
      courses:[
        { name:"Bogey Hills C.C.", par:72, holes:18 },
        { name:"Only Aces C.C.", par:72, holes:18 },
        { name:"Three Putt Pines Public", par:71, holes:18 }
      ],
      tier:"premium",
      features:{extendedDays:true,playaClub:true,adminAccess:true,
                 photos:true,aceWall:true,bunker:true,randos:true,
                 weather:true,guestSignup:true}
    };
    const DEFAULT_PLAYERS  = () => CONFIG.players;
    const DEFAULT_ADMIN_PW = () => CONFIG.adminPw;
    const DEFAULT_ACE_PW   = () => CONFIG.acePw;
    const GROUP_COLORS     = ["#d4af37","#7ec8a0","#7eb8d4","#d47e7e","#c4a07e","#b07ed4"];
    const ROW1 = [["signup","Sign Up"],["tally","Who's In"],["groups","Pairings"]];
    // Feature flags — resolved after config loads
    const isPremium = () => CONFIG.tier === "premium";
    const PREMIUM = isPremium; // legacy alias
    const getF = () => {
      const p = isPremium();
      return {
        extendedDays: p,           // premium — unlocks Mon-Fri dates
        playaClub:    p,           // premium — all-time rounds leaderboard
        adminAccess:  p,           // premium — admin panel + roster mgmt
        photos:       true,        // free
        aceWall:      p,           // premium — Hole in One wall
        crew:         p,           // premium — The Crew cards (formerly bunker)
        randos:       true,        // free
        weather:      true,        // free
        guestSignup:  true,        // free
      };
    };

    // ─────────────────────────────────────────────────────────────────
    // V2 HELPERS
    // ─────────────────────────────────────────────────────────────────
    function toIso(d) { return d.toISOString().split("T")[0]; }
    function fmtDateOnly(iso) {
      const d = new Date(iso + "T12:00:00");
      return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
    }
    function getRollingWeeks() {
      const today = new Date(); today.setHours(0,0,0,0);
      const start = new Date(today);
      start.setDate(today.getDate() - today.getDay());
      const weeks = [];
      for (let w = 0; w < 4; w++) {
        const week = [];
        for (let d = 0; d < 7; d++) {
          const dt = new Date(start);
          dt.setDate(start.getDate() + w*7 + d);
          week.push(dt);
        }
        weeks.push(week);
      }
      return weeks;
    }

    // ─────────────────────────────────────────────────────────────────
    // WIZARD COMPONENTS
    // ─────────────────────────────────────────────────────────────────
    const DAY_ABBR = ["Su","Mo","Tu","We","Th","Fr","Sa"];

    function WizardStepBar({ step }) {
      const courses = CONFIG.courses||[];
      const labels = courses.length===1 ? ["Dates","Golfers","Confirm"] : ["Dates","Golfers","Course"];
      return (
        <div style={{display:"flex",alignItems:"flex-start",marginBottom:20}}>
          {labels.map((lbl,i)=>{
            const n=i+1,done=step>n,active=step===n;
            return (
              <div key={i} style={{display:"flex",alignItems:"center",flex:i<labels.length-1?"1 1 auto":"0 0 auto"}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <div style={{width:28,height:28,borderRadius:"50%",fontSize:11,fontWeight:"bold",display:"flex",alignItems:"center",justifyContent:"center",background:done?"#d4af37":"transparent",border:done||active?"2px solid #d4af37":"2px solid rgba(212,175,55,0.3)",color:done?"#0d3d22":active?"#d4af37":"rgba(212,175,55,0.4)",boxShadow:active?"0 0 0 3px rgba(212,175,55,0.15)":"none",transition:"all 0.3s"}}>{done?"✓":n}</div>
                  <span style={{fontSize:8,fontWeight:"bold",letterSpacing:"1px",textTransform:"uppercase",color:active?"#d4af37":done?"rgba(212,175,55,0.6)":"rgba(212,175,55,0.25)",whiteSpace:"nowrap"}}>{lbl}</span>
                </div>
                {i<labels.length-1&&<div style={{flex:1,height:1,margin:"0 5px",marginBottom:16,background:done?"rgba(212,175,55,0.5)":"rgba(212,175,55,0.12)",transition:"background 0.3s"}}/>}
              </div>
            );
          })}
        </div>
      );
    }

    function WizardStep1({ onNext, isSubscriber, weatherByDate = {} }) {
      const [selected, setSelected] = useState(new Set());
      const weeks = getRollingWeeks();
      const today = new Date(); today.setHours(0,0,0,0);
      const toggle = (iso, date) => {
        const isWE = date.getDay()===0||date.getDay()===6;
        if (date < today || (!isSubscriber && !isWE)) return;
        setSelected(prev => { const n=new Set(prev); n.has(iso)?n.delete(iso):n.add(iso); return n; });
      };
      const allDates = weeks.flat();
      const months = [...new Set(allDates.map(d=>d.toLocaleString("default",{month:"long"})))];
      return (
        <div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:18,fontWeight:"bold",color:"#f0ead6"}}>When are you playing?</div>
            <div style={{fontSize:11,color:"rgba(212,175,55,0.6)",marginTop:3}}>{months.join(" · ")} {allDates[allDates.length-1].getFullYear()}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
            {DAY_ABBR.map((d,i)=><div key={d} style={{textAlign:"center",fontSize:9,fontWeight:"bold",letterSpacing:"0.5px",color:(i===0||i===6)?"rgba(212,175,55,0.7)":"rgba(240,234,214,0.2)",paddingBottom:2}}>{d}</div>)}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:3}}>
            {weeks.map((week,wi)=>(
              <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
                {week.map((date,di)=>{
                  const iso=toIso(date),isPast=date<today,isSel=selected.has(iso),isWE=di===0||di===6;
                  const isLock=!isSubscriber&&!isWE&&!isPast,isToday=date.getTime()===today.getTime();
                  const isWeekdayOn=!isWE&&!isLock&&!isPast&&!isToday; // unlocked weekday (premium)
                  const isDisabled=isPast||isLock;
                  let bg="rgba(0,0,0,0.25)",color="rgba(240,234,214,0.25)",border="1px solid rgba(255,255,255,0.06)",cursor="pointer",opacity=1,shadow="none";
                  if (isPast){bg="rgba(13,42,26,0.6)";color="rgba(240,234,214,0.12)";border="1px solid rgba(255,255,255,0.03)";cursor="default";opacity=0.45;}
                  else if(isLock){bg="rgba(13,42,26,0.75)";color="rgba(240,234,214,0.1)";border="1px solid rgba(255,255,255,0.03)";cursor="not-allowed";opacity=0.5;}
                  else if(isSel){bg="rgba(212,175,55,0.25)";color="#d4af37";border="1.5px solid #d4af37";shadow="0 0 8px rgba(212,175,55,0.25)";}
                  else if(isToday){bg="rgba(45,90,55,0.6)";border="1px solid rgba(212,175,55,0.4)";color="rgba(240,234,214,0.85)";}
                  else if(isWE){bg="rgba(45,105,62,0.55)";color="rgba(240,234,214,0.95)";border="1px solid rgba(255,255,255,0.18)";}
                  else if(isWeekdayOn){bg="rgba(35,78,48,0.38)";color="rgba(240,234,214,0.7)";border="1px solid rgba(255,255,255,0.09)";}
                  return (
                    <button key={iso} onClick={()=>!isDisabled&&toggle(iso,date)} style={{aspectRatio:"1",border,borderRadius:7,background:bg,color,fontWeight:isSel?"bold":isWE?"600":"400",fontSize:13,cursor,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:0,opacity,boxShadow:shadow,transition:"all 0.15s",position:"relative",fontFamily:"Georgia,serif",gap:0,pointerEvents:isDisabled?"none":"auto"}}>
                      <span style={{lineHeight:1}}>{date.getDate()}</span>
                      {isLock&&!isPast&&<span style={{position:"absolute",top:1,right:2,fontSize:7,opacity:0.5}}>🔒</span>}
                    </button>
                  );
                })}
              </div>
            ))}
          </div>
          {!isSubscriber&&<div style={{marginTop:10,padding:"7px 11px",borderRadius:8,background:"rgba(0,0,0,0.2)",border:"1px solid rgba(212,175,55,0.18)",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:12}}>🏅</span><span style={{fontSize:10,color:"rgba(212,175,55,0.55)",lineHeight:1.4}}><strong style={{color:"rgba(212,175,55,0.8)"}}>Pro members</strong> unlock weekday booking.</span></div>}
          <div style={{marginTop:12,fontSize:12,color:"rgba(240,234,214,0.35)",textAlign:"center",marginBottom:8}}>{selected.size===0?"Pick a day/s to get started":<span style={{color:"#d4af37",fontWeight:"bold"}}>{selected.size} date{selected.size>1?"s":""} selected</span>}</div>
          <button disabled={selected.size===0} onClick={()=>onNext([...selected])} style={{width:"100%",padding:"12px",borderRadius:9,border:"none",background:selected.size>0?"rgba(212,175,55,0.18)":"rgba(255,255,255,0.04)",color:selected.size>0?"#d4af37":"rgba(240,234,214,0.2)",fontSize:15,fontWeight:"bold",cursor:selected.size>0?"pointer":"default",fontFamily:"Georgia,serif",boxShadow:selected.size>0?"0 3px 14px rgba(212,175,55,0.3)":"none"}}>Next →</button>
        </div>
      );
    }

    function WizardStep2({ dates, players, handicaps, onUpdateHC, onNext, onBack, v2Signups = {} }) {
      const alreadyInSome = (g) => dates.some(iso => (v2Signups[iso]||[]).includes(g));
      const [localGuests, setLocalGuests] = useState([]);
      const allPlayers = [...players, ...localGuests];
      const [picked, setPicked] = useState(() => new Set(players.filter(alreadyInSome)));
      const [localHC, setLocalHC] = useState({...handicaps});
      const [guestName, setGuestName] = useState("");
      const toggle = (g) => setPicked(prev=>{const n=new Set(prev);n.has(g)?n.delete(g):n.add(g);return n;});
      const handleHCBlur = (name,val) => {
        const hc=parseInt(val);
        const next={...localHC};
        if(isNaN(hc)||val==="") delete next[name]; else next[name]=Math.max(0,Math.min(54,hc));
        setLocalHC(next); onUpdateHC(name,val);
      };
      const handleAddGuest = () => {
        const name = guestName.trim();
        if(!name || allPlayers.includes(name)) return;
        setLocalGuests(prev=>[...prev,name]);
        setPicked(prev=>{const n=new Set(prev);n.add(name);return n;});
        setGuestName("");
      };
      const partiallyIn = (g) => dates.some(iso => (v2Signups[iso]||[]).includes(g)) && !dates.every(iso => (v2Signups[iso]||[]).includes(g));
      return (
        <div>
          <div style={{marginBottom:12}}><div style={{fontSize:18,fontWeight:"bold",color:"#f0ead6"}}>Who's In?</div><div style={{fontSize:11,color:"rgba(212,175,55,0.6)",marginTop:3}}>Select all golfers playing and adjust handicap if necessary</div></div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
            {dates.map(d=><span key={d} style={{background:"rgba(212,175,55,0.12)",border:"1px solid rgba(212,175,55,0.3)",borderRadius:20,padding:"3px 9px",fontSize:10,color:"#d4af37",fontWeight:"bold"}}>{fmtDateOnly(d)}</span>)}
          </div>
          {dates.map(d=>{
            const existing=(v2Signups[d]||[]);
            if(!existing.length) return null;
            return (
              <div key={d} style={{marginBottom:8,padding:"6px 10px",borderRadius:7,background:"rgba(0,0,0,0.2)",border:"1px solid rgba(212,175,55,0.12)"}}>
                <div style={{fontSize:9,color:"rgba(212,175,55,0.5)",letterSpacing:"1px",textTransform:"uppercase",marginBottom:4}}>{fmtDateOnly(d)} — already in</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {existing.map(name=><span key={name} style={{fontSize:11,color:"rgba(240,234,214,0.65)",background:"rgba(212,175,55,0.08)",borderRadius:4,padding:"2px 7px"}}>{name}</span>)}
                </div>
              </div>
            );
          })}
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {allPlayers.map(g=>{
              const sel=picked.has(g);
              const partial=partiallyIn(g);
              const isGuest=localGuests.includes(g);
              return (
                <div key={g} onClick={()=>{if(isGuest||!alreadyInSome(g))toggle(g);}} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:9,border:sel?"1.5px solid #d4af37":partial?"1px solid rgba(212,175,55,0.25)":"1px solid rgba(255,255,255,0.07)",background:sel?"rgba(212,175,55,0.14)":partial?"rgba(212,175,55,0.05)":"rgba(255,255,255,0.03)",cursor:(isGuest||!alreadyInSome(g))?"pointer":"default",transition:"all 0.12s",fontFamily:"Georgia,serif",boxShadow:sel?"0 0 8px rgba(212,175,55,0.2)":"none",opacity:(!isGuest&&alreadyInSome(g))?0.85:1}}>
                  <span style={{fontSize:14,fontWeight:sel?"bold":"normal",color:sel?"#f0ead6":"rgba(240,234,214,0.65)",flex:1,textAlign:"left"}}>{g}</span>
                  <>
                    {partial&&<span style={{fontSize:9,color:"rgba(212,175,55,0.6)",letterSpacing:"0.5px",background:"rgba(212,175,55,0.08)",borderRadius:4,padding:"2px 7px",flexShrink:0}}>Some dates ✓</span>}
                    <div onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                      <span style={{fontSize:9,color:"rgba(212,175,55,0.4)",letterSpacing:"0.5px"}}>HC</span>
                      <input type="number" min="0" max="54" value={localHC[g]??""} placeholder="—" onChange={e=>setLocalHC(prev=>({...prev,[g]:e.target.value}))} onBlur={e=>handleHCBlur(g,e.target.value)} onWheel={e=>e.target.blur()} style={{width:36,height:26,borderRadius:5,border:"1px solid rgba(212,175,55,0.3)",background:"rgba(0,0,0,0.3)",color:"#d4af37",fontFamily:"Georgia,serif",fontSize:12,fontWeight:"bold",textAlign:"center",outline:"none",padding:0}}/>
                    </div>
{(!isGuest&&alreadyInSome(g))
                      ? <div style={{flexShrink:0,fontSize:12,color:"rgba(212,175,55,0.5)"}} title="Already signed up — remove via Who's In">🔒</div>
                      : <div style={{width:18,height:18,borderRadius:"50%",flexShrink:0,border:sel?"none":"1.5px solid rgba(212,175,55,0.25)",background:sel?"#d4af37":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#0d3d22",fontWeight:"bold"}}>{sel?"✓":""}{isGuest&&!sel&&<span style={{fontSize:8,color:"rgba(212,175,55,0.4)"}}>G</span>}</div>
                    }
                  </>
                </div>
              );
            })}
          </div>
          {/* Guest add bar */}
          <div style={{display:"flex",gap:8,marginTop:12,padding:"10px 12px",borderRadius:9,background:"rgba(0,0,0,0.2)",border:"1px solid rgba(212,175,55,0.12)"}}>
            <input
              type="text"
              placeholder="Add a guest..."
              value={guestName}
              onChange={e=>setGuestName(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handleAddGuest()}
              style={{flex:1,background:"transparent",border:"none",outline:"none",color:"#f0ead6",fontFamily:"Georgia,serif",fontSize:14}}
            />
            <button onClick={handleAddGuest} style={{background:"rgba(212,175,55,0.15)",border:"1px solid rgba(212,175,55,0.3)",borderRadius:6,color:"#d4af37",fontFamily:"Georgia,serif",fontSize:13,fontWeight:"bold",cursor:"pointer",padding:"4px 12px"}}>+ Add</button>
          </div>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button onClick={onBack} style={{flex:"0 0 auto",padding:"12px 16px",borderRadius:9,border:"1px solid rgba(212,175,55,0.18)",background:"transparent",color:"rgba(240,234,214,0.4)",fontSize:15,fontWeight:"bold",cursor:"pointer",fontFamily:"Georgia,serif"}}>← Back</button>
            <button disabled={picked.size===0} onClick={()=>onNext([...picked])} style={{flex:1,padding:"12px",borderRadius:9,border:"none",background:picked.size>0?"rgba(212,175,55,0.18)":"rgba(255,255,255,0.04)",color:picked.size>0?"#d4af37":"rgba(240,234,214,0.2)",fontSize:15,fontWeight:"bold",cursor:picked.size>0?"pointer":"default",fontFamily:"Georgia,serif",boxShadow:picked.size>0?"0 3px 14px rgba(212,175,55,0.3)":"none"}}>Next →</button>
          </div>
        </div>
      );
    }

    function WizardStep3({ dates, golfers, onBack, onSubmit }) {
      const courses = CONFIG.courses||[];
      const single = courses.length===1;
      const [picked, setPicked] = useState(courses.length>0?courses[0].name:null);
      const [submitted, setSubmitted] = useState(false);
      const handleSubmit = () => { setSubmitted(true); onSubmit(picked); };
      if (submitted) return (
        <div style={{textAlign:"center",padding:"40px 0 28px"}}>
          <div style={{fontSize:48,marginBottom:12}}>⛳</div>
          <div style={{fontSize:20,fontWeight:"bold",color:"#d4af37",marginBottom:8,letterSpacing:1}}>You're In!</div>
          <div style={{fontSize:13,color:"rgba(240,234,214,0.6)",lineHeight:1.8}}>
            <strong style={{color:"#f0ead6"}}>{golfers.join(", ")}</strong><br/>added to Who's In<br/>
            {dates.map(d=><span key={d}><strong style={{color:"#d4af37"}}>{fmtDateOnly(d)}</strong><br/></span>)}
            <span style={{fontSize:11,color:"rgba(212,175,55,0.5)"}}>@ {picked}</span>
          </div>
        </div>
      );
      return (
        <div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:18,fontWeight:"bold",color:"#f0ead6"}}>{single?"Confirm your round":"Which course?"}</div>
            <div style={{fontSize:11,color:"rgba(212,175,55,0.6)",marginTop:3}}>{golfers.length} golfer{golfers.length>1?"s":""} · {dates.length} date{dates.length>1?"s":""}</div>

    function getWeekendDates() {
      const now = new Date();
      const day = now.getDay(); // 0=Sun,1=Mon,...,6=Sat
      // Anchor to the most recent Saturday (or today if Saturday)
      // Friday(5), Saturday(6), Sunday(0) -> show current weekend
      // Monday(1) through Thursday(4) -> show upcoming weekend
      let diffToSat;
      if (day === 6) diffToSat = 0;        // today is Saturday
      else if (day === 0) diffToSat = -1;  // today is Sunday - look back to yesterday's Sat
      else if (day === 5) diffToSat = 1;   // today is Friday - look ahead to tomorrow's Sat
      else diffToSat = (6 - day + 7) % 7; // Mon-Thu - look ahead to next Sat
      const w1sat = new Date(now); w1sat.setDate(now.getDate() + diffToSat);
      const dates = {};
      const offsets = { fri1:-1, sat:0, sun:1, mon1:2, fri2:6, fri:7, mon:8, mon2:9 };
      const fmtFull = (d) => d.toLocaleDateString("en-US", { month:"short", day:"numeric" });
      const fmtDay  = (d) => String(d.getDate());
      const fmtMon  = (d) => d.toLocaleDateString("en-US", { month:"short" });
      Object.entries(offsets).forEach(([k,o]) => {
        const d = new Date(w1sat); d.setDate(w1sat.getDate() + o);
        dates[k] = { full: fmtFull(d), day: fmtDay(d), mon: fmtMon(d), date: d };
      });
      const key = `${w1sat.getFullYear()}-${w1sat.getMonth()}-${w1sat.getDate()}`;
      return { dates, key };
    }

    function chunkEvenly(arr) {
      if (!arr.length) return [];
      const n = arr.length;
      const numGroups = Math.ceil(n / 4);
      const base = Math.floor(n / numGroups);
      const remainder = n % numGroups;
      const groups = [];
      let idx = 0;
      for (let g = 0; g < numGroups; g++) {
        const size = base + (g < remainder ? 1 : 0);
        groups.push(arr.slice(idx, idx + size));
        idx += size;
      }
      return groups;
    }

    function compressImage(file, maxW = 800) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const scale = Math.min(1, maxW / img.width);
            const canvas = document.createElement("canvas");
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL("image/jpeg", 0.65));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // Supabase data helpers — single row per key in "store" table
    function clubKey(k){ return k; } // club_id column separates clubs
    async function dbGet(key) {
      key = clubKey(key);
      const { data } = await sb.from("store").select("value").eq("key", key).eq("club_id", CLUB_ID).maybeSingle();
      return data ? data.value : null;
    }
    async function dbSet(key, value) {
      key = clubKey(key);
      const { error } = await sb.from("store").upsert({ key, value, club_id: CLUB_ID }, { onConflict: "key,club_id" });
    }
    function dbListen(key, cb) {
      key = clubKey(key);
      const ch = sb.channel("store-" + CLUB_ID + "-" + key)
        .on("postgres_changes", { event: "*", schema: "public", table: "store", filter: `key=eq.${key}` },
          payload => {
            if (payload.new?.club_id && payload.new.club_id !== CLUB_ID) return;
            cb(payload.new?.value ?? null);
          })
        .subscribe();
      return () => sb.removeChannel(ch);
    }

          // One-time migration: scan recent weeks for lost photos and merge to permanent keys
          {
            const migrated = await dbGet("photosMigrated");
            if (!migrated) {
              const now = new Date();
              let allPics = ph || [], allBunker = b || [], allAce = a || [];
              for (let w = 1; w <= 8; w++) {
                const d = new Date(now); d.setDate(now.getDate() - w*7);
                const day = d.getDay();
                const diff = day === 6 ? 0 : -(day+1);
                const sat = new Date(d); sat.setDate(d.getDate()+diff);

                const [op, ob, oa] = await Promise.all([dbGet(`photos-${k}`), dbGet(`bunker-${k}`), dbGet(`ace-${k}`)]);

                if (oa && oa.length) allAce = [...allAce, ...oa.filter(x => !allAce.find(y=>y.id===x.id))];

          // Check if we need to roll over from last week
          const lastProcessed = await dbGet("lastProcessedWeek");
          const now2 = new Date();
          const todayDay = now2.getDay(); // 0=Sun,1=Mon,...,6=Sat
          // Find previous Saturday (the most recent past week's anchor)
          const diffToPrevSat = todayDay === 6 ? -7 : -(todayDay + 1);
          const prevSat = new Date(now2);
          prevSat.setDate(now2.getDate() + diffToPrevSat);
          const prevKey = `${prevSat.getFullYear()}-${prevSat.getMonth()}-${prevSat.getDate()}`;

          const shouldReset = prevKey !== lastProcessed && prevKey !== weekKey &&
            (hadMonday ? todayDay >= 2 : todayDay >= 1);

          if (shouldReset) {
            const prevSignups = await dbGet(`signups-${prevKey}`) || {};

            // 1. Tally completed rounds (only sat/sun/fri1/mon1 from prev week)
            const currentATR = await dbGet("allTimeRounds") || {};
            const updatedATR = { ...currentATR };
            Object.entries(prevSignups).forEach(([name, days]) => {
              const rounds = ['fri1','sat','sun','mon1'].filter(k=>days[k]).length;
              if (rounds > 0) updatedATR[name] = (updatedATR[name] || 0) + rounds;
            });
            await dbSet("allTimeRounds", updatedATR);
            setAllTimeRounds(updatedATR);

            // 2. Migrate week2 signups (fri/mon keys) forward to new weekKey as sat/sun
            const newSignups = {};
            const newOrder = {};
            Object.entries(prevSignups).forEach(([name, days]) => {
              if (days.fri || days.mon) {
                newSignups[name] = { sat: !!days.fri, sun: !!days.mon };
              }
            });
            // Migrate group order too
            const prevOrder = await dbGet(`order-${prevKey}`) || {};
            if (prevOrder.fri && prevOrder.fri.length) newOrder.sat = prevOrder.fri;
            if (prevOrder.mon && prevOrder.mon.length) newOrder.sun = prevOrder.mon;
            // Migrate guests who signed up for week2 - check if they had fri/mon signups
            const prevGuests = await dbGet(`guests-${prevKey}`) || [];
            const migratedGuests = prevGuests.filter(name => prevSignups[name]?.fri || prevSignups[name]?.mon);
            // Save migrated data to new weekKey — merge with any existing signups
            if (Object.keys(newSignups).length > 0) {
              const existingSignups = await dbGet(`signups-${weekKey}`) || {};
              const mergedSignups = { ...newSignups, ...existingSignups };
              await dbSet(`signups-${weekKey}`, mergedSignups);
              setSignups(mergedSignups);
            }
            if (Object.keys(newOrder).length > 0) {
              const existingOrder = await dbGet(`order-${weekKey}`) || {};
              const mergedOrder = {
                sat: [...new Set([...(newOrder.sat||[]), ...(existingOrder.sat||[])])],
                sun: [...new Set([...(newOrder.sun||[]), ...(existingOrder.sun||[])])],
              };
              await dbSet(`order-${weekKey}`, mergedOrder);
              setGroupOrder(mergedOrder);
            }
            if (migratedGuests.length > 0) {
              const existingGuests = await dbGet(`guests-${weekKey}`) || [];
              const mergedGuests = [...new Set([...migratedGuests, ...existingGuests])];
              await dbSet(`guests-${weekKey}`, mergedGuests);
              setGuestPlayers(mergedGuests);
            }

            // 3. Clear previous week
            await dbSet(`signups-${prevKey}`, {});
            await dbSet(`order-${prevKey}`, {});
            await dbSet(`guests-${prevKey}`, []);
            await dbSet("lastProcessedWeek", prevKey);

            // Clean up old rows — delete anything older than 2 weeks
            try {
              const cutoff = new Date();
              cutoff.setDate(cutoff.getDate() - 14);
              await sb.from("store").delete()
                .eq("club_id", CLUB_ID)
                .like("key", "signups-%")
                .lt("key", `signups-${cutoff.getFullYear()}-${cutoff.getMonth()}-${cutoff.getDate()}`);
              await sb.from("store").delete()
                .eq("club_id", CLUB_ID)
                .like("key", "order-%")
                .lt("key", `order-${cutoff.getFullYear()}-${cutoff.getMonth()}-${cutoff.getDate()}`);
              await sb.from("store").delete()
                .eq("club_id", CLUB_ID)
                .like("key", "activeDays-%")
                .lt("key", `activeDays-${cutoff.getFullYear()}-${cutoff.getMonth()}-${cutoff.getDate()}`);
              await sb.from("store").delete()
                .eq("club_id", CLUB_ID)
                .like("key", "guests-%")
                .lt("key", `guests-${cutoff.getFullYear()}-${cutoff.getMonth()}-${cutoff.getDate()}`);
            } catch(e) { console.warn("Cleanup failed:", e); }
          }
          setLoading(false);
          if(new URLSearchParams(window.location.search).get('view')==='tally') setView('tally');
          // Auto-fetch weather (14 days covers both weekends + extras)
          try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${CONFIG.weatherLat}&longitude=${CONFIG.weatherLon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&temperature_unit=fahrenheit&timezone=${encodeURIComponent(CONFIG.timezone)}&forecast_days=16`);
            const wdata = await res.json();
            const today = new Date();
            const td = today.getDay();
            const dSat = td === 6 ? 0 : (6 - td + 7) % 7 || 7;
            function wCode(code) {
              if (code === 0) return "☀️"; if (code <= 2) return "⛅"; if (code <= 3) return "☁️";
              if (code <= 49) return "🌫️"; if (code <= 69) return "🌧️"; if (code <= 79) return "❄️";
              if (code <= 84) return "🌦️"; if (code <= 99) return "⛈️"; return "🌤️";
            }
            function wd(i) { const idx=Math.max(0,i); return idx<wdata.daily.weathercode.length?{icon:wCode(wdata.daily.weathercode[idx]),hi:Math.round(wdata.daily.temperature_2m_max[idx]),rain:wdata.daily.precipitation_probability_max[idx]}:null; }
            const offsets = { fri1:-1, sat:0, sun:1, mon1:2, fri2:6, fri:7, mon:8, mon2:9 };
            const w = {};
            Object.entries(offsets).forEach(([k,o]) => { w[k] = wd(dSat+o); });
            setWeather(w);
            // v2: index by ISO date
            const byDate = {};
            (wdata.daily.time||[]).forEach((dateStr,i) => {
              byDate[dateStr] = {icon:wCode(wdata.daily.weathercode[i]),hi:Math.round(wdata.daily.temperature_2m_max[i]),lo:Math.round(wdata.daily.temperature_2m_min[i]),rain:wdata.daily.precipitation_probability_max[i]};
            });
            setWeatherByDate(byDate);
          } catch(e) {}
        }
        init();
        const unsubs = [
          dbListen("players",              v => v && setPlayers(v)),
          dbListen(`signups-${weekKey}`,   v => setSignups(v||{})),
          dbListen(`order-${weekKey}`,     v => setGroupOrder(v||{sat:[],sun:[]})),
          dbListen("photos-all",           v => { if(!deletingRef.current) setPhotos(v||[]); }),
          dbListen("bunker-all",           v => { if(!deletingRef.current) setBunkerPhotos(v||[]); }),
          dbListen("bunker-reactions",     v => setReactions(v||{})),
          dbListen("crew-data",            v => v && setCrewData(v)),
          dbListen("crew-fields",          v => v && setCrewFields(v)),
          dbListen("ace-all",              v => { if(!deletingRef.current) setAcePhotos(v||[]); }),
          dbListen("passwords",            v => v && setPasswords(v)),
          dbListen("allTimeRounds",         v => v && setAllTimeRounds(v)),
          dbListen(`guests-${weekKey}`,        v => setGuestPlayers(v||[])),
          dbListen(`activeDays-${weekKey}`,    v => v && setActiveDays(v)),
          dbListen("v2-signups",             v => v && setV2Signups(v)),
          dbListen("v2-courses",             v => v && setV2Courses(v)),
          dbListen("handicaps",              v => v && setHandicaps(v)),
        ];
        return () => unsubs.forEach(u => u());
      }, [weekKey]);

      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      async function toggle(name, day) {
        // Update local state immediately so UI responds instantly
        const cur    = signups[name] || {};
        const wasIn  = !!cur[day];
        const nextSignups = { ...signups, [name]: { ...cur, [day]: !wasIn } };
        setSignups(nextSignups);
        const curOrder = groupOrder[day] || [];
        let nextOrder;
        if (wasIn) {
          nextOrder = shuffle(curOrder.filter(n => n !== name));
        } else {
          nextOrder = shuffle([...curOrder, name]);
        }
        setGroupOrder(prev => ({ ...prev, [day]: nextOrder }));
        setFlash(name+day); setTimeout(()=>setFlash(null),700);
        // Then persist to DB
        await dbSet(`signups-${weekKey}`, nextSignups);
        await dbSet(`order-${weekKey}`, { ...groupOrder, [day]: nextOrder });
      }

          const keyMap = {
            pics:   "photos-all",
            bunker: "bunker-all",
            ace:    "ace-all",
          };
          const setterMap = {
            pics:   setPhotos,
            bunker: setBunkerPhotos,
            ace:    setAcePhotos,
          };
          const key = keyMap[wall];
          const setter = setterMap[wall];
          // Always fetch latest from DB to avoid stale state on multi-upload
          const latest = await dbGet(key) || [];
          const photo = { id:Date.now(), dataUrl, caption:(capOverride??"")?.trim()||"", uploader:"", ts:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}) };
          const next = [photo, ...latest];
          setter(next);
          await dbSet(key, next);
        } catch(e) { console.error(e); }
        setUploading(false);
      }

      async function deletePhoto(id, wall) {
        const maps = {
          pics:   { setter:setPhotos,       key:"photos-all" },
          bunker: { setter:setBunkerPhotos, key:"bunker-all" },
          ace:    { setter:setAcePhotos,    key:"ace-all"    },
        };
        const { setter, key } = maps[wall];
        deletingRef.current = true;
        // Always fetch fresh from DB to avoid stale closure overwriting previous deletes
        const fresh = (await dbGet(key)) || [];
        const next = fresh.filter(p => p.id !== id);
        setter(next);
        setLightboxList(next);
        // Close lightbox if no photos left, otherwise show next one
        if (next.length === 0) {
          setLightbox(null);
        } else {
          const oldIdx = fresh.findIndex(p=>p.id===id);
          const newIdx = Math.min(oldIdx, next.length - 1);
          setLightbox({...next[newIdx], wall});
        }
        await dbSet(key, next);
        setTimeout(() => { deletingRef.current = false; }, 500);
      }

      // ── v2: HC update ──
      async function updateHandicap(name, val) {
        const hc = parseInt(val);
        const next = {...handicaps};
        if (isNaN(hc)||val==="") delete next[name]; else next[name]=Math.max(0,Math.min(54,hc));
        setHandicaps(next);

      }

      // ── v2: Snake-draft groups balanced by HC ──
      // Players sorted low→high, distributed so each group gets one low, one-two mid, one high.
      function buildHCGroups(playerList) {
        if (!playerList.length) return [];
        const sorted = [...playerList].sort((a,b)=>(handicaps[a]??20)-(handicaps[b]??20));
        const numGroups = Math.ceil(sorted.length/4);
        const groups = Array.from({length:numGroups},()=>[]);
        sorted.forEach((player,i)=>{
          const round=Math.floor(i/numGroups),pos=i%numGroups;
          const groupIdx = round%2===0 ? pos : numGroups-1-pos;
          groups[groupIdx].push(player);
        });
        return groups;
      }
